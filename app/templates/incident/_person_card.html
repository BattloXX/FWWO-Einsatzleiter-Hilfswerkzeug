<div class="card card--rescue" data-uid="{{ person.id }}" data-kind="person"
     style="cursor: pointer;"
     hx-get="/einsatz/{{ incident.id }}/person/{{ person.id }}/detail"
     hx-target="#cardDetailBody"
     hx-swap="innerHTML"
     hx-trigger="click[!event.target.closest('select,input,button,a')]"
     hx-on::after-swap="document.getElementById('cardDetailModal').showModal()">
  <div class="card__body">
    <div class="card__title">
      {{ person.gender }}, {{ person.person_group }}
      {% if person.age_range %}<span class="card__age">{{ person.age_range }}</span>{% endif %}
    </div>
    {% if person.name %}<div class="card__sub">{{ person.name }}</div>{% endif %}
    {% if person.location %}<div class="card__sub">📍 {{ person.location }}</div>{% endif %}
    <div class="card__meta">
      <span class="card__time">{{ person.created_at|local_time }}</span>
    </div>
  </div>
</div>
