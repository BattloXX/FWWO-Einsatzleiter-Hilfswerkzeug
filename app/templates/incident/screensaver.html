<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Bildschirmschoner – {{ incident.alarm_type_code }} – einsatzleiter.cloud</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    .ss-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      padding: 24px;
    }
    .ss-logo {
      max-width: min(260px, 55vw);
      max-height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(183,25,33,.5));
    }
    .ss-clock {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 40px rgba(255,255,255,.15);
    }
    .ss-alarm-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 700px;
      text-align: center;
    }
    .ss-alarm-badge {
      font-size: 1.4rem;
      font-weight: 700;
      padding: 4px 16px;
      border-radius: 6px;
      background: #b71921;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .ss-alarm-text {
      font-size: clamp(1.1rem, 3.5vw, 1.8rem);
      color: rgba(255,255,255,.85);
      line-height: 1.3;
    }
    .ss-back {
      position: fixed;
      top: 12px;
      right: 16px;
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: .8rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ss-back:hover { background: rgba(255,255,255,.2); }
    @media (orientation: landscape) {
      .ss-wrap { flex-direction: row; flex-wrap: wrap; }
      .ss-logo { max-height: 80px; }
      .ss-clock { font-size: clamp(3rem, 15vh, 8rem); }
    }
  </style>
</head>
<body>
  <a href="/einsatz/{{ incident.id }}" class="ss-back">✕ Schließen</a>

  <div class="ss-wrap">
    <img class="ss-logo" src="/static/img/logo.png" alt="einsatzleiter.cloud">

    <div class="ss-clock" id="ssClock">--:--:--</div>

    <div class="ss-alarm-wrap">
      {% if incident.alarm_type_code %}
      <span class="ss-alarm-badge">{{ incident.alarm_type_code }}</span>
      {% endif %}
      <span class="ss-alarm-text" id="ssAlarmText">
        {{ incident.report_text or incident.reason or (incident.address_street ~ ' ' ~ (incident.address_no or '') ~ ', ' ~ (incident.address_city or '')) | trim or '–' }}
      </span>
    </div>
  </div>

  <script>
  // ── Uhrzeit ──────────────────────────────────────────────────────────
  function updateClock() {
    document.getElementById('ssClock').textContent =
      new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Wake Lock (Web Screen Wake Lock API als PWA-Fallback) ────────────
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      await navigator.wakeLock.request('screen');
    } catch (e) {
      console.warn('WakeLock nicht verfügbar:', e.message);
    }
  }
  acquireWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') acquireWakeLock();
  });

  // ── Native Wake Lock über Capacitor-Bridge ──────────────────────────
  if (window.ELNative && window.ELNative.keepAwake) {
    window.ELNative.keepAwake(true);
  }
  window.addEventListener('beforeunload', () => {
    if (window.ELNative && window.ELNative.keepAwake) window.ELNative.keepAwake(false);
  });

  // ── WebSocket Live-Update ────────────────────────────────────────────
  const incidentId = {{ incident.id }};
  let ws;
  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/incident/' + incidentId);
    ws.onmessage = function(e) {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'incident_closed') {
          // Einsatz beendet → zurück zur Übersicht
          location.href = '/';
        } else if (msg.type === 'reload_board' || msg.type === 'incident_leader_changed') {
          // Alarmtext könnte sich geändert haben → Seite neu laden
          location.reload();
        }
        // ping/pong
        if (msg.type === 'ping') ws.send(JSON.stringify({ type: 'pong' }));
      } catch (_) {}
    };
    ws.onclose = function() {
      setTimeout(connectWs, 3000);
    };
  }
  connectWs();
  </script>
</body>
</html>
