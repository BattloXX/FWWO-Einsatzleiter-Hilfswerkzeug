<div class="card card--message {% if msg.is_done %}card--done{% endif %}"
     data-uid="{{ msg.id }}" data-kind="message"
     style="cursor: pointer;"
     hx-get="/einsatz/{{ incident.id }}/meldung/{{ msg.id }}/detail"
     hx-target="#cardDetailBody"
     hx-swap="innerHTML"
     hx-trigger="click[!event.target.closest('select,input,button,a')]"
     hx-on::after-swap="document.getElementById('cardDetailModal').showModal()">
  <div class="card__body">
    <div class="card__title" style="display:flex;align-items:center;gap:6px;">
      {% if can_edit %}
      <span style="display:inline-flex;gap:3px;flex-shrink:0;" onclick="event.stopPropagation()">
        {% set sl = msg.status if msg.status else 'open' %}
        <button title="Offen" style="width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;background:{% if sl=='open' %}#e53935{% else %}rgba(255,255,255,.15){% endif %};"
                hx-post="/einsatz/{{ incident.id }}/meldung/{{ msg.id }}/ampel"
                hx-vals='{"status":"open"}' hx-swap="none"></button>
        <button title="In Arbeit" style="width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;background:{% if sl=='in_progress' %}#f9a825{% else %}rgba(255,255,255,.15){% endif %};"
                hx-post="/einsatz/{{ incident.id }}/meldung/{{ msg.id }}/ampel"
                hx-vals='{"status":"in_progress"}' hx-swap="none"></button>
        <button title="Erledigt" style="width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;background:{% if sl=='done' %}#43a047{% else %}rgba(255,255,255,.15){% endif %};"
                hx-post="/einsatz/{{ incident.id }}/meldung/{{ msg.id }}/ampel"
                hx-vals='{"status":"done"}' hx-swap="none"></button>
      </span>
      {% endif %}
      {{ msg.title }}
    </div>
    {% if msg.detail %}<div class="card__sub">{{ msg.detail }}</div>{% endif %}
    {% if msg.due_at %}
    <div class="card__due">⏰ Fällig: {{ msg.due_at|local_time }}</div>
    {% endif %}
    {% if msg.vehicle %}
    <div class="card__gk" style="font-size:.75rem;opacity:.7;">→ {{ msg.vehicle.vehicle_master.code }}</div>
    {% endif %}
  </div>
</div>
