# CloudPanel NGINX Vhost Snippet – einsatz.feuerwehr-wolfurt.at
# Diese Datei in den "Custom Nginx Config" Block des CloudPanel-Vhosts einfügen.

# Statische Dateien direkt ausliefern (kein Proxy)
location /static/ {
    alias /home/clp-einsatz/htdocs/einsatzleiter/app/static/;
    expires 7d;
    add_header Cache-Control "public, immutable";
    gzip_static on;
}

# WebSocket Upgrade (zwingend für /ws/ Endpoints)
location /ws/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# Alles andere zur FastAPI-App
location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 10m;
}
